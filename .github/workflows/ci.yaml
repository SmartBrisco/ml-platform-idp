name: ML Platform IDP Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 250830191837.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: ml-platform-idp
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # -----------------------------------------
  # BUILD AND PUSH
  # -----------------------------------------
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        id: build
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

# -----------------------------------------
  # TRIVY SCAN
  # -----------------------------------------
  scan:
    name: Trivy Security Scan
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  # -----------------------------------------
  # SIGN WITH COSIGN
  # -----------------------------------------
  sign:
    name: Sign Image with Cosign
    needs: [build, scan]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: |
          cosign sign --yes \
          ${{ needs.build.outputs.image }}

  # -----------------------------------------
  # AUDIT LOG
  # -----------------------------------------
  audit:
    name: Audit Log
    needs: [build, scan, sign]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write audit record to S3
        run: |
          cat > audit-record.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "image": "${{ needs.build.outputs.image }}",
            "build_status": "${{ needs.build.result }}",
            "scan_status": "${{ needs.scan.result }}",
            "sign_status": "${{ needs.sign.result }}",
            "run_id": "${{ github.run_id }}",
            "repository": "${{ github.repository }}"
          }
          EOF
          aws s3 cp audit-record.json \
          s3://gitops-infra-pipeline-tfstate/ml-platform-audit/${{ github.sha }}.json          